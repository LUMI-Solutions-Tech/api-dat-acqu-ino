<!doctype html>
<html>

<head>
    <title>Graphics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h1>Graphics</h1>
    <div style="display: flex;">
        <div style="width: 50%;">
            <canvas id="sensorLux"></canvas>
        </div>
        <div style="width: 50%;">
            <canvas id="sensorPpfd"></canvas>
        </div>
    </div>

    <script>
        var sensorLux = new Chart(document.getElementById('sensorLux').getContext('2d'), {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Lux',
                    borderColor: '#63B1BC',
                    backgroundColor: '#ED145B'
                }]
            },
            options: {
                scales: {
                    x: { beginAtZero: true },
                    y: {
                        title: { display: true, text: 'Lux' },
                        beginAtZero: true,
                    },
                },
            }
        });

        var sensorPpfd = new Chart(document.getElementById('sensorPpfd').getContext('2d'), {
            type: 'line',
            data: {
                datasets: [{
                    label: 'PPFD',
                    borderColor: '#63B1BC',
                    backgroundColor: '#0762C8'
                }]
            },
            options: {
                scales: {
                    x: { beginAtZero: true },
                    y: {
                        title: { display: true, text: 'PPFD (µmol/m²/s)' },
                        beginAtZero: true
                    }
                }
            }
        });

        var paginacao = {};
        var tempo = {};

        function obterDados(graficoLux, graficoPpfd) {
            fetch('http://localhost:3300/sensores/analogico')
                .then(response => response.json())
                .then(valores => {
                    if (paginacao['analogico'] == null) paginacao['analogico'] = 0;
                    if (tempo['analogico'] == null) tempo['analogico'] = 0;

                    var ultimaPaginacao = paginacao['analogico'];
                    paginacao['analogico'] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        // mantém apenas os últimos 10 pontos no gráfico
                        if (graficoLux.data.labels.length == 10) {
                            graficoLux.data.labels.shift();
                            graficoLux.data.datasets[0].data.shift();
                            graficoPpfd.data.labels.shift();
                            graficoPpfd.data.datasets[0].data.shift();
                        }

                        graficoLux.data.labels.push(tempo['analogico']);
                        graficoLux.data.datasets[0].data.push(valor.lux);

                        graficoPpfd.data.labels.push(tempo['analogico']++);
                        graficoPpfd.data.datasets[0].data.push(valor.ppfd);

                        graficoLux.update();
                        graficoPpfd.update();
                    });
                })
                .catch(error => console.error('Erro ao obter dados:', error));
        }

        setInterval(() => {
            obterDados(sensorLux, sensorPpfd);
        }, 1000);

    </script>
</body>

</html>
