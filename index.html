<!DOCTYPE html>
<html>
<head>
  <title>PPFD</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<canvas id="chartPpfd"></canvas>

<script>
// Criação do gráfico de linha
var chartPpfd = new Chart(document.getElementById('chartPpfd').getContext('2d'), {
  type: 'line', // tipo do gráfico (linha)
  data: {
    labels: [], // eixo X 
    datasets: [
      {
        label: 'PPFD (µmol/m²/s)', // nome da linha no gráfico
        data: [], // valores do gráfico 
        borderColor: '#378ADD', 
        fill: false 
      },
    ]
  },
  options: {
    scales: {
      y: {
        min: 0,  
        max: 20,  
        title: {
          display: true,
          text: 'µmol/m²/s' 
        }
      }
    }
  }
});

// Variável usada para controlar quais dados já foram exibidos
var paginacao = 0;

// Função que busca dados do servidor
function obterDados() {
  fetch('http://localhost:3300/sensores/analogico') // faz requisição para API
    .then(function(response) { return response.json(); }) // converte resposta para JSON
    .then(function(valores) {

      // Pega apenas os dados novos 
      var novos = valores.slice(paginacao);

      // Atualiza a paginação com o total de dados recebidos
      paginacao = valores.length;

      // Percorre cada novo valor 
      novos.forEach(function(valor) {

        // Mantém no máximo 10 pontos no gráfico
        if (chartPpfd.data.labels.length >= 10) {
          chartPpfd.data.labels.shift(); // remove o primeiro label
          chartPpfd.data.datasets[0].data.shift(); // remove o primeiro valor
        }

        // Adiciona novo ponto no eixo X 
        chartPpfd.data.labels.push(paginacao++);

        // Adiciona valor do PPFD no gráfico (
        chartPpfd.data.datasets[0].data.push(parseFloat(valor.ppfd));

        // Atualiza o gráfico na tela
        chartPpfd.update();
      });
    })
    .catch(function(error) { 
      // Caso dê erro na requisição
      console.error('Erro:', error); 
    });
}

// Executa a função a cada 1 segundo (1000 ms)
setInterval(obterDados, 1000);
</script>

</body>
</html>
